version: 2
updates:
  # Maintain npm dependencies (WordPress plugins)
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      test-tools:
        patterns:
          - "jest*"
        update-types:
          - "minor"
          - "patch"
      other-dev:
        patterns:
          - "@types/*"
          - "globals"
          - "prettier"
        update-types:
          - "minor"
          - "patch"
    # TypeScript & ESLint packages (typescript, @typescript-eslint/*, @eslint/*, eslint*)
    # are intentionally NOT assigned to any group to disable automatic updates.
    # Use scripts/check-tool-upgrades.sh to check for available updates manually.

  # Python dependencies (notebooks) are manually maintained since they're rarely used
  # Constrained in pyproject.toml with compatible-release ranges to reduce churn; update only when actively working on notebooks

  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
