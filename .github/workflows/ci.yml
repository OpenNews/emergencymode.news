name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: xdebug
          tools: composer

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install uv
        run: pip install uv

      - name: Install Node dependencies
        run: npm ci

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install Python dependencies
        run: uv sync

      - name: Run lint
        run: npm run lint

      - name: Run JavaScript tests
        run: npm run test:js

      - name: Run PHP tests
        run: npm run test:php

      - name: Run shell script tests
        run: npm run test:scripts
