name: Dev Container

on:
  pull_request:
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer.yml"
  push:
    branches:
      - main
      - staging
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer.yml"
  schedule:
    # Weekly on Mondays at 9 AM UTC to catch broken dependencies
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and test devcontainer
        uses: devcontainers/ci@v0.3
        with:
          env: |
            CI=true
          runCmd: |
            set -e
            echo "=== Devcontainer Health Check ==="
            echo "Verifying the devcontainer builds and can be used for development."
            echo "Full test suite runs in ci.yml - this only validates the container."
            echo ""

            # Verify postCreateCommand (setup.sh) completed successfully
            echo "Checking tools installed by setup.sh..."
            uv --version
            shellcheck --version
            gh --version

            # Verify base tools from devcontainer features
            echo "Checking devcontainer features..."
            node --version
            npm --version
            php --version
            composer --version
            python3 --version

            # Quick smoke test: verify dependencies can be installed
            echo ""
            echo "Smoke test: verifying dependencies can be installed..."
            npm ci
            composer install --no-interaction --no-progress

            echo ""
            echo "=== ✓ Devcontainer is healthy ==="
            echo "Container builds successfully and all tools are available."
