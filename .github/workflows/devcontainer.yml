name: Dev Container

on:
  pull_request:
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer.yml"
  push:
    branches:
      - main
      - staging
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer.yml"
  schedule:
    # Weekly on Mondays at 9 AM UTC to catch broken dependencies
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and test devcontainer
        uses: devcontainers/ci@v0.3
        with:
          # Build the devcontainer image
          imageName: ghcr.io/opennews/emergencymode-news-devcontainer

          # Set environment variables inside the container
          env: |
            CI=true

          # Run a basic smoke test inside the container
          runCmd: |
            set -e
            echo "=== Verifying container health ==="

            # Verify CI environment variable is set
            if [ "${CI:-}" != "true" ]; then
              echo "ERROR: CI environment variable not set correctly"
              exit 1
            fi
            echo "CI environment variable: $CI ✓"

            # Check required tools are installed
            echo "Checking uv..."
            uv --version

            echo "Checking Node.js..."
            node --version
            npm --version

            echo "Checking PHP..."
            php --version
            composer --version

            echo "Checking Python..."
            python3 --version

            echo "Checking shellcheck..."
            shellcheck --version

            echo "Checking GitHub CLI..."
            gh --version

            # Verify uv is the pinned version
            echo "Verifying uv version matches setup.sh..."
            UV_VERSION=$(uv --version | awk '{print $2}')
            if [ "$UV_VERSION" != "0.5.10" ]; then
              echo "ERROR: Expected uv 0.5.10, got $UV_VERSION"
              exit 1
            fi

            # Verify .venv was NOT created (setup.sh should skip uv sync in CI)
            if [ -d ".venv" ]; then
              echo "ERROR: .venv should not exist in CI mode"
              exit 1
            fi
            echo ".venv correctly skipped in CI mode ✓"

            echo "=== Container health check passed ==="
