name: Dev Container

on:
  pull_request:
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer.yml"
  push:
    branches:
      - main
      - staging
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer.yml"
  schedule:
    # Weekly on Mondays at 9 AM UTC to catch broken dependencies
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and test devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            set -e
            echo "=== Devcontainer Dependency Health Check ==="
            echo "This workflow verifies the devcontainer builds and all dependencies work."
            echo "Dependabot cannot manage devcontainer.json - this catches drift."
            echo ""

            # Verify base tools from features are installed
            echo "Checking base tools..."
            node --version
            npm --version
            php --version
            composer --version
            python3 --version

            # Verify tools from setup.sh
            uv --version
            shellcheck --version
            gh --version

            # Install project dependencies
            echo ""
            echo "Installing Node.js dependencies..."
            npm install

            echo "Installing PHP dependencies..."
            composer install

            echo "Installing Python dependencies..."
            uv sync

            # Run tests to verify environment actually works
            echo ""
            echo "Running test suite to verify environment..."
            npm test
            composer test

            echo ""
            echo "=== ✓ Devcontainer health check passed ==="
            echo "All dependencies installed and tests passed."
