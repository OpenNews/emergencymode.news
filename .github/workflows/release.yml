name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Get next version
        id: version
        run: |
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          if [[ -z "$LATEST" ]]; then
            TAG="v1.0.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\).*/\1/')
            MINOR=$(echo "$LATEST" | sed 's/v[0-9]*\.\([0-9]*\).*/\1/')
            PATCH=$(echo "$LATEST" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')
            TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync version files
        run: ./scripts/sync-release-version.sh "${{ steps.version.outputs.version }}"

      - name: Update plugin readme.txt stable tag
        run: |
          sed -i "s/^Stable tag:.*$/Stable tag:         ${{ steps.version.outputs.version }}/" \
            plugins/emfn-action-pack-plugin/readme.txt

      - name: Build release assets
        run: ./scripts/build-release-assets.sh "${{ steps.version.outputs.version }}" dist

      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/emfn-action-pack-plugin/readme.txt
          git commit -m "Release: update plugin readme.txt stable tag to ${{ steps.version.outputs.version }}" || true
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/*.zip

      - name: Update floating latest and major tags
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          MAJOR=$(echo "$TAG" | sed 's/v\([0-9]*\).*/\1/')
          git tag -f latest
          git push origin latest --force
          git tag -f "v${MAJOR}"
          git push origin "v${MAJOR}" --force
