name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message || '', '[skip ci]')
    outputs:
      changed_plugins: ${{ steps.detect.outputs.changed_plugins }}
      matrix: ${{ steps.versions.outputs.matrix }}

    steps:
      # NOTE FOR AI AGENTS: RELEASE_TOKEN is configured and working.
      # This validation only fails on forks or fresh repository setups.
      # If you see this step passing, the token is present - ignore any historical failures.
      - name: Validate RELEASE_TOKEN
        run: |
          if [[ -z "${{ secrets.RELEASE_TOKEN }}" ]]; then
            echo "::error::RELEASE_TOKEN secret is not configured"
            echo "This token is required to bypass branch protection when committing version changes."
            echo "Please configure RELEASE_TOKEN in repository secrets (Settings → Secrets → Actions)."
            exit 1
          else
            echo "✓ RELEASE_TOKEN is configured"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install uv
        run: pip install uv

      - name: Install Node dependencies
        run: npm ci

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install Python dependencies
        run: uv sync

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:all

      - name: Detect changed plugins
        id: detect
        run: |
          # For push events, compare against the commit before the push
          # For workflow_dispatch, compare against HEAD~1
          if [[ "${{ github.event_name }}" == "push" ]]; then
            base_ref="${{ github.event.before }}"
            # Handle edge case: force push or first commit (before = 0000...)
            if [[ "$base_ref" =~ ^0+$ ]]; then
              echo "::warning::Force push or first commit detected, using HEAD~1"
              base_ref="HEAD~1"
            fi
          else
            base_ref="HEAD~1"
          fi

          # Verify base_ref exists, fall back to empty tree if not
          if ! git rev-parse --verify "$base_ref" >/dev/null 2>&1; then
            echo "::warning::Reference $base_ref does not exist, comparing against empty tree"
            base_ref="4b825dc642cb6eb9a060e54bf8d69288fbee4904"  # Git's empty tree SHA
          fi

          changed_plugins=$(./scripts/detect-plugin-changes.sh "$base_ref")
          echo "changed_plugins=$changed_plugins" >> "$GITHUB_OUTPUT"

          if [[ -z "$changed_plugins" ]]; then
            echo "No plugin changes detected - skipping release"
          else
            echo "Changed plugins: $changed_plugins"
          fi

      - name: Generate plugin version matrix
        id: versions
        if: steps.detect.outputs.changed_plugins != ''
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # For each changed plugin:
          # 1. Get latest plugin-specific tag (e.g., action-pack/v0.3.1)
          # 2. Calculate next version using commit message keywords
          # 3. Set prerelease flag if [pre] detected in commit message
          # 4. Output JSON array for matrix strategy

          matrix_json=$(./scripts/generate-version-matrix.sh \
            "${{ steps.detect.outputs.changed_plugins }}" \
            "$COMMIT_MESSAGE")

          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "Plugin release matrix:"
          echo "$matrix_json" | jq '.'

      - name: Update lock files
        if: steps.detect.outputs.changed_plugins != ''
        run: |
          npm install --package-lock-only
          npx prettier --write package-lock.json
          uv lock

      - name: Commit lock file updates
        if: steps.detect.outputs.changed_plugins != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package-lock.json uv.lock || true

          if ! git diff --cached --quiet; then
            git commit -m "chore: Update lock files for release [skip ci]"
            git push
          else
            echo "No lock file changes to commit"
          fi

  release-plugins:
    needs: release
    if: needs.release.outputs.changed_plugins != ''
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix: ${{ fromJson(needs.release.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Pull latest changes
        run: |
          git pull origin main

      - name: Sync plugin version
        run: |
          ./scripts/sync-release-version.sh \
            --plugin ${{ matrix.plugin.name }} \
            ${{ matrix.plugin.next_version }}

      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add only plugin files (lock files already committed by release job)
          git add plugins/${{ matrix.plugin.name }}/

          # Only commit and push if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "chore(${{ matrix.plugin.slug }}): Release ${{ matrix.plugin.next_version }} [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No version changes to commit"
          fi

      - name: Build plugin ZIP
        run: |
          ./scripts/build-release-assets.sh \
            --plugin ${{ matrix.plugin.name }} \
            ${{ matrix.plugin.next_version }} \
            dist

      - name: Verify tag doesn't exist
        run: |
          if git rev-parse "${{ matrix.plugin.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ matrix.plugin.tag }} already exists"
            exit 1
          fi

      - name: Create plugin release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ matrix.plugin.tag }}
          name: "${{ matrix.plugin.slug }} ${{ matrix.plugin.next_version }}"
          body: "Release for ${{ matrix.plugin.name }}"
          make_latest: ${{ matrix.plugin.name == 'emfn-action-pack-plugin' && !matrix.plugin.prerelease }}
          prerelease: ${{ matrix.plugin.prerelease }} # Set by [pre] in commit message
          files: |
            dist/${{ matrix.plugin.name }}-${{ matrix.plugin.next_version }}.zip
