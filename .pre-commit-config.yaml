repos:
  # Shellcheck for bash scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-x]

  # YAML schema validation for GitHub workflows
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.30.0
    hooks:
      - id: check-github-workflows
        args: [--verbose]

  - repo: local
    hooks:
      # Use project's npm Prettier (from devDependencies) to ensure version consistency
      - id: prettier
        name: Prettier
        entry: npx prettier --write
        language: system
        files: \.(html|css|js|json|yml|yaml|md)$
        exclude: ^(node_modules|\.venv|dist|tmp)/
      - id: eslint
        name: ESLint
        entry: npx eslint --fix
        language: system
        files: \.(js)$
        exclude: ^(node_modules|\.venv|dist|tmp)/
      - id: strip-notebook-outputs
        name: Strip notebook outputs
        entry: scripts/strip-notebook-outputs.sh
        language: system
        pass_filenames: true
        always_run: false
        files: ^notebooks/.*\.ipynb$
      - id: check-notebooks-clean
        name: Check notebooks are clean
        entry: scripts/check-notebooks-clean.sh
        language: system
        pass_filenames: true
        always_run: false
        files: ^notebooks/.*\.ipynb$
