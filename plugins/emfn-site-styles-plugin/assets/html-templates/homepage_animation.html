<script>
  (function () {
    const isInIframe = window.self !== window.top;
    const isDebug = new URLSearchParams(window.location.search).get("emfnDebug") === "true";
    if (isInIframe) {
      console.debug("Running in iframe, skipping animation");
      return;
    }

    document.addEventListener("DOMContentLoaded", function () {
      const HOLD = 5400; //ms to hold each word before transitioning to the next
      let idx = 0;
      let lastSwitchTime = performance.now();

      const words = document.querySelectorAll(".emfn-word");
      if (!words.length) {
        if (isDebug) console.debug("No .emfn-word elements found");
        return;
      }

      function animate(currentTime) {
        if (currentTime - lastSwitchTime >= HOLD) {
          words[idx].classList.remove("emfn-active");
          idx = (idx + 1) % words.length;
          words[idx].classList.add("emfn-active");
          lastSwitchTime = currentTime;
        }
        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    });
  })();
</script>
